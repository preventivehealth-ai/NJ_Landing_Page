<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PreventiveHealth.ai Website Versions</title>
  <meta name="description" content="Choose between the two PreventiveHealth.ai landing page versions." />
  <style>
    :root{
      --black:#100D0A;
      --beige:#F5F0E8;
      --beige-2:#FFF9EF;
      --gold:#C28A2E;
      --gold-soft:#EFC37B;
      --muted:#6F6254;
      --line:rgba(16,13,10,.14);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:32px;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 10%, rgba(194,138,46,.16), transparent 30%),
        radial-gradient(circle at 85% 85%, rgba(16,13,10,.08), transparent 34%),
        var(--beige);
      color:var(--black);
    }
    main{
      width:min(760px, 100%);
      background:rgba(255,249,239,.86);
      border:1px solid var(--line);
      border-radius:18px;
      padding:40px;
      box-shadow:0 24px 70px rgba(16,13,10,.12);
    }
    img{
      display:block;
      width:auto;
      height:34px;
      max-width:260px;
      object-fit:contain;
      margin-bottom:36px;
    }
    h1{
      margin:0 0 10px;
      font-family:Georgia, serif;
      font-size:clamp(2rem, 5vw, 3.2rem);
      line-height:1.04;
      font-weight:400;
    }
    p{
      margin:0 0 28px;
      color:var(--muted);
      font-size:1rem;
      line-height:1.6;
      max-width:56ch;
    }
    .links{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
    }
    a{
      display:block;
      padding:20px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--black);
      text-decoration:none;
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    a:hover{
      transform:translateY(-2px);
      border-color:rgba(194,138,46,.56);
      box-shadow:0 14px 34px rgba(16,13,10,.10);
    }
    strong{
      display:block;
      margin-bottom:6px;
      font-size:1.05rem;
    }
    span{
      color:var(--muted);
      font-size:.92rem;
      line-height:1.45;
    }
    .v2{
      background:var(--black);
      color:var(--beige-2);
      border-color:rgba(239,195,123,.34);
    }
    .v2 span{color:#D6CAB9}
    .tag{
      display:inline-flex;
      margin-bottom:16px;
      color:var(--gold);
      font-size:.76rem;
      font-weight:800;
      letter-spacing:.18em;
      text-transform:uppercase;
    }
    @media (max-width:640px){
      body{padding:18px}
      main{padding:28px}
      .links{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <main>
    <img src="assets/preventivehealth-logo-lightmode.png" alt="PreventiveHealth.ai" />
    <div class="tag">Website Preview</div>
    <h1>Choose a version</h1>
    <p>These are the two PreventiveHealth.ai landing page versions prepared for review.</p>
    <div class="links">
      <a href="preventivehealth-ai-website-branded.html">
        <strong>Version 1</strong>
        <span>Original branded color direction.</span>
      </a>
      <a class="v2" href="preventivehealth-ai-website-branded-v2.html">
        <strong>Version 2</strong>
        <span>Black, gold, beige direction with Fraunces typography.</span>
      </a>
    </div>
  </main>
</body>
</html>
